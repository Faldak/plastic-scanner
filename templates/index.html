<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>Сканер пластика</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f1117;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}

/* ── Header ── */
header{
  background:#161921;border-bottom:1px solid #232635;
  padding:14px 18px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10;
}
header .logo{width:34px;height:34px;flex-shrink:0}
header h1{font-size:17px;font-weight:600;color:#fff}
header p{font-size:11px;color:#666;margin-top:1px}

/* ── Layout ── */
.page{max-width:480px;margin:0 auto;padding:16px 14px 32px;display:flex;flex-direction:column;gap:14px}

/* ── Card ── */
.card{background:#161921;border:1px solid #232635;border-radius:16px;overflow:hidden}

/* ── Camera ── */
.cam-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000}
video{width:100%;height:100%;object-fit:cover;display:block}
.cam-placeholder{
  width:100%;aspect-ratio:4/3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:#444;background:#0a0c12;
}
.cam-placeholder svg{opacity:.5}
.cam-placeholder p{font-size:13px}
.overlay{
  position:absolute;inset:0;pointer-events:none;
  display:none;align-items:center;justify-content:center;
}
.overlay.on{display:flex}
.frame{
  width:190px;height:190px;
  border:2px solid rgba(255,255,255,.55);border-radius:14px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.38);
}
.hint{
  position:absolute;bottom:12px;left:0;right:0;
  text-align:center;font-size:12px;color:rgba(255,255,255,.6);
}

/* ── Buttons ── */
.btn-row{padding:12px 14px;display:flex;gap:10px}
.btn{
  flex:1;border:none;border-radius:11px;padding:13px 8px;
  font-size:15px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity .15s;
}
.btn:active{opacity:.75}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-blue{background:#3d7ef5;color:#fff}
.btn-green{background:#22c55e;color:#fff}
.upload-label{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 14px;margin:0 14px 12px;
  border:1px dashed #2e3246;border-radius:10px;
  font-size:13px;color:#666;cursor:pointer;transition:all .15s;
}
.upload-label:hover{border-color:#444;color:#aaa}
.upload-label input{display:none}

/* ── Loading ── */
.loading{
  display:none;align-items:center;justify-content:center;gap:10px;
  padding:18px;color:#666;font-size:14px;
}
.loading.on{display:flex}
.spin{
  width:22px;height:22px;border:2px solid #2a2d3a;border-top-color:#3d7ef5;
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result ── */
.result{display:none}
.result.on{display:block}

.result-head{
  padding:16px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid #1e2230;
}
.result-head.green{background:#0b2415}
.result-head.red{background:#250b0b}
.result-head.orange{background:#251a0b}
.result-icon{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.result-icon.green{background:#1a3d25}
.result-icon.red{background:#3d1a1a}
.result-icon.orange{background:#3d2a1a}
.verdict{font-size:19px;font-weight:700}
.verdict.green{color:#4ade80}
.verdict.red{color:#f87171}
.verdict.orange{color:#fb923c}
.plastic-name{font-size:12px;color:#666;margin-top:3px}

.result-body{padding:14px;display:flex;flex-direction:column;gap:10px}

.preview-img{width:100%;border-radius:10px;max-height:140px;object-fit:cover;display:none}
.preview-img.on{display:block}

.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-code{background:#1a2540;color:#7eb8f7}
.badge-conf{background:#251e0a;color:#d4a017}
.badge-no{background:#251010;color:#f87171}
.badge-yes{background:#0a2515;color:#4ade80}

.info-box{
  background:#0a0c12;border:1px solid #1e2230;border-radius:10px;padding:12px;
  font-size:13px;line-height:1.65;color:#bbb;
}
.info-box b{display:block;color:#e0e0e0;font-size:12px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}

.tip-box{
  background:#0f1420;border-left:3px solid #3d7ef5;border-radius:0 8px 8px 0;
  padding:10px 12px;font-size:12px;color:#7eb8f7;line-height:1.6;
}

/* ── Error ── */
.error-box{
  display:none;margin:0 14px 12px;
  background:#250b0b;border:1px solid #4a1a1a;border-radius:10px;
  padding:12px;font-size:13px;color:#f87171;line-height:1.5;
}
.error-box.on{display:block}

/* ── History ── */
.hist-section{display:none}
.hist-section.on{display:block}
.hist-title{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 2px}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{
  background:#161921;border:1px solid #1e2230;border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.hist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hist-dot.green{background:#4ade80}
.hist-dot.red{background:#f87171}
.hist-dot.orange{background:#fb923c}
.hist-txt{flex:1;font-size:13px;color:#ccc}
.hist-time{font-size:11px;color:#444}

footer{text-align:center;font-size:11px;color:#333;padding:8px 0 4px}
</style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 34 34" fill="none">
    <circle cx="17" cy="17" r="16" fill="#161921" stroke="#3d7ef5" stroke-width="1"/>
    <path d="M17 8C21.4 8 25 11.6 25 16C25 20.4 21.4 24 17 24L17 21.5C20 21.5 22.5 19 22.5 16C22.5 13 20 10.5 17 10.5L17 8Z" fill="#22c55e"/>
    <path d="M17 8L14.5 11L17 10.5L19.5 11Z" fill="#22c55e"/>
    <path d="M17 26C12.6 26 9 22.4 9 18C9 13.6 12.6 10 17 10L17 12.5C14 12.5 11.5 15 11.5 18C11.5 21 14 23.5 17 23.5L17 26Z" fill="#3d7ef5"/>
    <path d="M17 26L19.5 23L17 23.5L14.5 23Z" fill="#3d7ef5"/>
  </svg>
  <div>
    <h1>Сканер пластика</h1>
    <p>Powered by Roboflow AI</p>
  </div>
</header>

<div class="page">

  <!-- Camera card -->
  <div class="card">
    <div class="cam-wrap" id="camWrap">
      <div class="cam-placeholder" id="placeholder">
        <svg width="44" height="44" fill="none" viewBox="0 0 44 44">
          <rect x="5" y="12" width="34" height="24" rx="5" stroke="#555" stroke-width="1.5"/>
          <circle cx="22" cy="24" r="7" stroke="#555" stroke-width="1.5"/>
          <circle cx="22" cy="24" r="3.5" fill="#333"/>
          <path d="M16 12L18.5 8H25.5L28 12" stroke="#555" stroke-width="1.5"/>
        </svg>
        <p>Нажмите «Включить камеру»</p>
      </div>
      <video id="video" autoplay playsinline style="display:none"></video>
      <div class="overlay" id="overlay">
        <div>
          <div class="frame"></div>
          <div class="hint">Наведите на маркировку ♺</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-blue" id="btnStart" onclick="startCam()">
        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        Включить камеру
      </button>
      <button class="btn btn-green" id="btnScan" onclick="scan()" disabled>
        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5z"/></svg>
        Сканировать
      </button>
    </div>

    <label class="upload-label">
      <svg width="15" height="15" fill="#666" viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5C3.9 5 3 5.9 3 7v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
      Загрузить из галереи
      <input type="file" accept="image/*" onchange="uploadFile(this)">
    </label>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spin"></div>
    Анализирую пластик...
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div class="card result" id="result">
    <div class="result-head" id="resultHead">
      <div class="result-icon" id="resultIcon"></div>
      <div>
        <div class="verdict" id="verdict"></div>
        <div class="plastic-name" id="plasticName"></div>
      </div>
    </div>
    <div class="result-body">
      <img class="preview-img" id="preview" alt="">
      <div class="badges" id="badges"></div>
      <div class="info-box" id="infoBox"></div>
      <div class="tip-box" id="tipBox" style="display:none"></div>
    </div>
  </div>

  <!-- History -->
  <div class="hist-section" id="histSection">
    <div class="hist-title">История сканов</div>
    <div class="hist-list" id="histList"></div>
  </div>

  <footer>Данные не сохраняются · Только ваш браузер</footer>
</div>

<script>
let camStream = null;
let scanHistory = [];

// ── Camera ───────────────────────────────────────────
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    const v = document.getElementById('video');
    v.srcObject = camStream;
    v.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('overlay').classList.add('on');
    document.getElementById('btnScan').disabled = false;
    const btn = document.getElementById('btnStart');
    btn.textContent = '✓ Камера работает';
    btn.disabled = true;
  } catch(e) {
    showErr('Нет доступа к камере. Разрешите в настройках браузера и перезагрузите страницу.');
  }
}

// ── Capture ───────────────────────────────────────────
function getFrameB64() {
  const v = document.getElementById('video');
  const c = document.createElement('canvas');
  c.width = v.videoWidth;
  c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  return { b64: c.toDataURL('image/jpeg', 0.85).split(',')[1], url: c.toDataURL('image/jpeg', 0.85) };
}

function scan() {
  const { b64, url } = getFrameB64();
  sendToServer(b64, url);
}

function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    const b64 = url.split(',')[1];
    sendToServer(b64, url);
  };
  reader.readAsDataURL(file);
}

// ── API ───────────────────────────────────────────────
async function sendToServer(b64, previewUrl) {
  setLoading(true);
  hideResult();
  hideErr();

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: b64 })
    });
    const data = await resp.json();
    setLoading(false);

    if (data.error) { showErr(data.error); return; }
    showResult(data, previewUrl);
    if (data.found && data.code) addHistory(data);

  } catch(e) {
    setLoading(false);
    showErr('Ошибка соединения с сервером: ' + e.message);
  }
}

// ── UI helpers ────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading').className = on ? 'loading on' : 'loading';
}
function hideResult() { document.getElementById('result').className = 'card result'; }
function hideErr()    { document.getElementById('errorBox').className = 'error-box'; }
function showErr(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg; el.className = 'error-box on';
}

function showResult(d, previewUrl) {
  const result = document.getElementById('result');
  result.className = 'card result on';

  let cls, icon, verdictText;

  if (!d.found) {
    cls = 'red'; icon = '?';
    verdictText = 'Не распознано';
    document.getElementById('plasticName').textContent = d.message || '';
    document.getElementById('infoBox').innerHTML = '<b>Совет</b>Поднесите предмет ближе. Хорошее освещение улучшает точность.';
    document.getElementById('tipBox').style.display = 'none';
    document.getElementById('badges').innerHTML = '';
    document.getElementById('preview').className = 'preview-img';
  } else {
    cls = d.color || 'orange';
    icon = d.recyclable === true ? '♻' : d.recyclable === false ? '🗑' : '?';
    verdictText = d.verdict || 'Результат';
    document.getElementById('plasticName').textContent = d.raw_label || '';

    document.getElementById('badges').innerHTML =
      `<span class="badge badge-conf">Уверенность: ${d.confidence}%</span>` +
      (d.recyclable === true
        ? `<span class="badge badge-yes">Перерабатывается</span>`
        : d.recyclable === false
        ? `<span class="badge badge-no">Не перерабатывается</span>`
        : `<span class="badge badge-conf">Уточните локально</span>`);

    document.getElementById('infoBox').innerHTML =
      `<b>Что делать</b>${d.instruction || ''}`;

    const tip = document.getElementById('tipBox');
    if (d.tip) {
      tip.textContent = '💡 ' + d.tip;
      tip.style.display = 'block';
    } else {
      tip.style.display = 'none';
    }

    const prev = document.getElementById('preview');
    if (previewUrl) {
      prev.src = previewUrl;
      prev.className = 'preview-img on';
    }
  }

  document.getElementById('resultHead').className = `result-head ${cls}`;
  document.getElementById('resultIcon').className = `result-icon ${cls}`;
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('verdict').className = `verdict ${cls}`;
  document.getElementById('verdict').textContent = verdictText;
}

function addHistory(d) {
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  scanHistory.unshift({ cls: d.color, label: `${d.name} #${d.code}`, time });
  if (scanHistory.length > 8) scanHistory.pop();
  renderHistory();
}

function renderHistory() {
  if (!scanHistory.length) return;
  document.getElementById('histSection').className = 'hist-section on';
  document.getElementById('histList').innerHTML = scanHistory.map(h =>
    `<div class="hist-item">
      <div class="hist-dot ${h.cls}"></div>
      <div class="hist-txt">${h.label}</div>
      <div class="hist-time">${h.time}</div>
    </div>`
  ).join('');
}
</script>
</body>
</html>
